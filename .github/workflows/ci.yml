name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Typecheck / Test / Build / OpenAPI
    runs-on: ubuntu-latest

    env:
      # Run GitHub-hosted JavaScript actions (checkout, setup-node, etc.) on Node 24
      # instead of the legacy Node 20 runner. Safe to set alongside node-version: '24'.
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build

      - name: OpenAPI check
        run: npm run openapi:check

      - name: Compliance check
        run: npm run compliance:check
